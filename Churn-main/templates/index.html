<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="main-container">

<div class="dashboard">

<!-- ================================================= -->
<!-- HEADER -->
<!-- ================================================= -->

<div class="title">

    <h1>
        <i class="fa-solid fa-chart-line"></i>
        Customer Churn Prediction
    </h1>

    <p>
        AI Powered Customer Retention Analytics Dashboard
    </p>

</div>

<form action="/predict" method="POST">

<!-- ================================================= -->
<!-- CUSTOMER INFORMATION -->
<!-- ================================================= -->

<div class="section blue">

<h2>

<i class="fa-solid fa-user"></i>

Customer Information

</h2>

<div class="grid">

<div class="form-group">

<label>Gender</label>

<select name="gender">

<option>Male</option>

<option>Female</option>

</select>

</div>

<div class="form-group">

<label>Senior Citizen</label>

<select name="SeniorCitizen">

<option value="0">No</option>

<option value="1">Yes</option>

</select>

</div>

<div class="form-group">

<label>Partner</label>

<select name="Partner">

<option>No</option>

<option>Yes</option>

</select>

</div>

<div class="form-group">

<label>Dependents</label>

<select name="Dependents">

<option>No</option>

<option>Yes</option>

</select>

</div>

<div class="form-group">

<label>Tenure (Months)</label>

<input
type="number"
name="tenure"
min="0"
max="72"
required>

</div>

</div>

</div>

<!-- ================================================= -->
<!-- SERVICES -->
<!-- ================================================= -->

<div class="section purple">

<h2>

<i class="fa-solid fa-wifi"></i>

Services

</h2>

<div class="grid">

<div class="form-group">

<label>Phone Service</label>

<select name="PhoneService">

<option>No</option>

<option>Yes</option>

</select>

</div>

<div class="form-group">

<label>Multiple Lines</label>

<select name="MultipleLines">

<option>No</option>

<option>Yes</option>

<option>No phone service</option>

</select>

</div>

<div class="form-group">

<label>Internet Service</label>

<select name="InternetService">

<option>DSL</option>

<option>Fiber optic</option>

<option>No</option>

</select>

</div>

<div class="form-group">

<label>Online Security</label>

<select name="OnlineSecurity">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>

<div class="form-group">

<label>Online Backup</label>

<select name="OnlineBackup">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>

<div class="form-group">

<label>Device Protection</label>

<select name="DeviceProtection">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>

<div class="form-group">

<label>Tech Support</label>

<select name="TechSupport">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>
<div class="form-group">

<label>Streaming TV</label>

<select name="StreamingTV">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>

<div class="form-group">

<label>Streaming Movies</label>

<select name="StreamingMovies">

<option>Yes</option>

<option>No</option>

<option>No internet service</option>

</select>

</div>

</div>

</div>

<!-- ============================================= -->
<!-- BILLING INFORMATION -->
<!-- ============================================= -->

<div class="section orange">

<h2>

<i class="fa-solid fa-credit-card"></i>

Billing Information

</h2>

<div class="grid">

<div class="form-group">

<label>Contract</label>

<select name="Contract">

<option>Month-to-month</option>

<option>One year</option>

<option>Two year</option>

</select>

</div>

<div class="form-group">

<label>Paperless Billing</label>

<select name="PaperlessBilling">

<option>Yes</option>

<option>No</option>

</select>

</div>

<div class="form-group">

<label>Payment Method</label>

<select name="PaymentMethod">

<option>Electronic check</option>

<option>Mailed check</option>

<option>Bank transfer (automatic)</option>

<option>Credit card (automatic)</option>

</select>

</div>

</div>

</div>

<!-- ============================================= -->
<!-- CHARGES -->
<!-- ============================================= -->

<div class="section green">

<h2>

<i class="fa-solid fa-wallet"></i>

Charges

</h2>

<div class="grid">

<div class="form-group">

<label>Monthly Charges</label>

<input
type="number"
step="0.01"
name="MonthlyCharges"
placeholder="Example : 75.50"
required>

</div>

<div class="form-group">

<label>Total Charges</label>

<input
type="number"
step="0.01"
name="TotalCharges"
placeholder="Example : 2450.75"
required>

</div>

</div>

</div>

<!-- ============================================= -->
<!-- BUTTON -->
<!-- ============================================= -->

<div class="predict-area">

<button type="submit">

<i class="fa-solid fa-brain"></i>

Predict Customer Churn

</button>

</div>

</form>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
